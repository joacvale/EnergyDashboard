<div class="login-container">
  <div class="left-section">
      <div class="welcome-content">
        <h1>Welcome!</h1>
        <p>
          Please login to view the solar energy dashboard.
        </p>
      </div>
  </div>

  <div class="right-section">
    <div class="login-card">
      <div *ngIf="error" class="alert alert-danger">
        {{ error }}
      </div>
      <h2>Login</h2>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <input
            type="text"
            formControlName="username"
            class="form-control"
            placeholder="Username*">
          <div
            *ngIf="submitted && form['username'].hasError('required')"
            class="has-error">
            Username is required
          </div>
        </div>
        <div class="form-group">
          <input
            type="password"
            formControlName="password"
            class="form-control"
            placeholder="Password*">
          <div
            *ngIf="submitted && form['password'].hasError('required')"
            class="has-error">
            Password is required
          </div>
        </div>
        <button
          type="submit"
          [disabled]="loading"
          class="login-button" >
          Login
        </button>
      </form>
    </div>
  </div>
</div>
