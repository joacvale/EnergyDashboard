<mat-toolbar>

  <div>
    <button mat-button (click)="openSidepanel()">
      <mat-icon>view_headline</mat-icon>
    </button> 
  </div>
  <div class="left-section" routerLink="/">
    <mat-icon>{{ icon }}</mat-icon>
    <span>{{ title }}</span>
  </div>

  <mat-form-field class="country-selector" appearance="outline">
    <mat-select [ngModel]="selectedCountry" (ngModelChange)="updateCountry($event)">
      @for (country of solarPanelService.countryData(); track country.code) {
        <mat-option [value]="country.code">
          {{ country.name }}
        </mat-option>
      }
    </mat-select>
  </mat-form-field>

  <span class="spacer"></span>

  @if (!isLogged) {
  <button mat-raised-button color="primary" (click)="login()">Login</button>
  } @else {
  <button mat-button (click)="logout()">
    <mat-icon>account_circle</mat-icon>
    Logout
  </button>
  }

</mat-toolbar>
